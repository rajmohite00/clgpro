services:
  - type: web
    name: voice-rag-api
    runtime: python
    rootDir: voice_rag_openaisdk
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker api:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: HF_TOKEN
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
