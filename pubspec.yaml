name: projectclg
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  google_fonts: ^6.3.2
  provider: ^6.1.2
  http: ^1.2.0
  image_picker: ^1.2.1
  file_picker: ^8.1.4
  flutter_screenutil: ^5.9.3
  pdf: ^3.11.3
  printing: ^5.14.3
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  syncfusion_flutter_pdf: ^33.1.47
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"

flutter_native_splash:
  color: "#050A0F"
  image: "assets/icon.png"
  android_12:
    image: "assets/icon.png"
    icon_background_color: "#050A0F"
